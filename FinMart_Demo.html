    getTransactions: async () => { await API.delay(); return MOCK_TRANSACTIONS; },
  },
  securities: {
    list: async () => { await API.delay(); return MOCK_SECURITIES; },
    get: async (isin) => { await API.delay(); return MOCK_SECURITIES.find(s => s.isin === isin); },
  },
  portfolio: {
    get: async () => { await API.delay(); return { account: MOCK_ACCOUNT, holdings: MOCK_HOLDINGS }; },
    getHoldings: async () => { await API.delay(); return MOCK_HOLDINGS; },
  },
  trade: {
    buy: async (isin, qty) => { await API.delay(1000); return { success: true, tradeId: "tr-new-" + Date.now() }; },

  },
  deposit: async (amount, currency, method, creditData) => { await API.delay(1200); return { success: true }; },
  withdraw: async (amount, currency, destination) => { await API.delay(1200); return { success: true }; },
  notifications: {

    markRead: async (id) => { await API.delay(200); return { success: true }; },
  },
};

  const symbols = { UAH: "₴", USD: "$", EUR: "€" };

};
const fmtDate = (d) => new Date(d).toLocaleDateString("uk-UA");

const fmtShort = (n) => {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + " млн";
  if (n >= 1000) return (n / 1000).toFixed(0) + " тис";
  return fmt(n, 0);
};

// ============================================================
// PORTFOLIO PIE CHART COMPONENT (with monetary + % labels on slices)
// ============================================================
const PIE_COLORS = {
  "Облігації UAH": "#00E5A0",
  "Облігації USD": "#3b82f6",
  "Облігації EUR": "#f59e0b",
  "Нараховані %":  "#a855f7",
  "Кеш":           "#64748b",
};

function PortfolioPieChart({ holdings, account, portfolioValuation, navigate, onSliceClick, onTitleClick }) {
  const [selected, setSelected] = useState(null);

  const totalAccruedInterest = holdings.reduce((s, h) => {
    const sec = getSecurityByIsin(h.isin);
    if (!sec) return s;
    const daysSinceCoupon = Math.max(1, Math.floor((new Date() - new Date(sec.issueDate)) / (1000*60*60*24)) % (sec.couponFrequency === "quarterly" ? 90 : 180));
    const dailyCoupon = (sec.couponRate / 100 * sec.faceValue) / 365;
    return s + dailyCoupon * daysSinceCoupon * h.quantity * (fxRates[sec.currency] || 1);
  }, 0);

  const totalCashUAH = account.balanceUah + account.balanceUsd * fxRates.USD + account.balanceEur * fxRates.EUR;

  const sliceData = [];
  if (portfolioValuation.UAH) sliceData.push({ key: "Облігації UAH", value: portfolioValuation.UAH.marketValue, currency: "UAH" });
  if (portfolioValuation.USD) sliceData.push({ key: "Облігації USD", value: portfolioValuation.USD.marketValue * fxRates.USD, currency: "USD" });
  if (portfolioValuation.EUR) sliceData.push({ key: "Облігації EUR", value: portfolioValuation.EUR.marketValue * fxRates.EUR, currency: "EUR" });
  sliceData.push({ key: "Нараховані %", value: totalAccruedInterest, currency: null });
  sliceData.push({ key: "Кеш", value: totalCashUAH, currency: null });

  const grandTotal = sliceData.reduce((s, d) => s + d.value, 0);

  const cx = 140, cy = 140, outerR = 120, innerR = 78, svgSize = 280;

  const arcs = useMemo(() => {
    let cumAngle = -90;
    return sliceData.map((slice) => {
      const pct = grandTotal > 0 ? slice.value / grandTotal : 0;
      const angle = pct * 360;
      const startAngle = cumAngle;
      const endAngle = cumAngle + angle;
      cumAngle = endAngle;
      return { ...slice, pct, startAngle, endAngle };
    });
  }, [sliceData, grandTotal]);

  const describeArc = (startAngle, endAngle, outerRadius, innerRadius) => {
    const toRad = (a) => (a * Math.PI) / 180;
    const largeArc = endAngle - startAngle > 180 ? 1 : 0;
    const sx1 = cx + outerRadius * Math.cos(toRad(startAngle));
    const sy1 = cy + outerRadius * Math.sin(toRad(startAngle));
    const sx2 = cx + outerRadius * Math.cos(toRad(endAngle));
    const sy2 = cy + outerRadius * Math.sin(toRad(endAngle));
    const sx3 = cx + innerRadius * Math.cos(toRad(endAngle));
    const sy3 = cy + innerRadius * Math.sin(toRad(endAngle));
    const sx4 = cx + innerRadius * Math.cos(toRad(startAngle));
    const sy4 = cy + innerRadius * Math.sin(toRad(startAngle));
    return `M ${sx1} ${sy1} A ${outerRadius} ${outerRadius} 0 ${largeArc} 1 ${sx2} ${sy2} L ${sx3} ${sy3} A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${sx4} ${sy4} Z`;
  };

  const handleSliceClick = (key) => {
    setSelected(prev => prev === key ? null : key);
    if (onSliceClick) onSliceClick(key);
  };

  const handleCenterClick = () => {
    setSelected(null);
  };

  const getFilteredHoldings = () => {
    if (selected === null) return holdings;
    if (selected === "Кеш") return "cash";
    if (selected === "Нараховані %") return "accrued";
    const curMap = { "Облігації UAH": "UAH", "Облігації USD": "USD", "Облігації EUR": "EUR" };
    const cur = curMap[selected];
    return holdings.filter(h => {
      const sec = getSecurityByIsin(h.isin);
      return sec && sec.currency === cur;
    });
  };

  const filteredHoldings = getFilteredHoldings();
  const selectedSlice = selected ? arcs.find(a => a.key === selected) : null;

  // Calculate label position on each slice
  const getSliceLabel = (arc) => {
    if (arc.pct < 0.04) return null; // Skip labels for very small slices
    const midAngle = (arc.startAngle + arc.endAngle) / 2;
    const labelR = (outerR + innerR) / 2;
    const toRad = (a) => (a * Math.PI) / 180;
    const lx = cx + labelR * Math.cos(toRad(midAngle));
    const ly = cy + labelR * Math.sin(toRad(midAngle));
    return { x: lx, y: ly, pct: arc.pct, value: arc.value };
  };

  return (
    <div style={{ marginTop: 16 }}>
      {/* Donut chart */}
      <div className="pie-chart-container">
        <svg width={svgSize} height={svgSize} viewBox={`0 0 ${svgSize} ${svgSize}`}>
          {arcs.map((arc, i) => {
            if (arc.pct <= 0) return null;
            const isSelected = selected === arc.key;
            const isOther = selected && !isSelected;
            const midAngle = (arc.startAngle + arc.endAngle) / 2;
            const nudge = isSelected ? 6 : 0;
            const dx = nudge * Math.cos(midAngle * Math.PI / 180);
            const dy = nudge * Math.sin(midAngle * Math.PI / 180);
            return (
              <path
                key={arc.key}
                d={describeArc(arc.startAngle, arc.endAngle - 0.5, outerR, innerR)}
                fill={PIE_COLORS[arc.key]}
                opacity={isOther ? 0.25 : 1}
                style={{
                  cursor: "pointer",
                  transform: `translate(${dx}px, ${dy}px)`,
                  transition: "all 0.3s ease",
                  filter: isSelected ? `drop-shadow(0 0 8px ${PIE_COLORS[arc.key]}80)` : "none",
                }}
                onClick={() => handleSliceClick(arc.key)}
              />
            );
          })}
          {/* Monetary + % labels on slices */}
          {arcs.map((arc) => {
            const label = getSliceLabel(arc);
            if (!label) return null;
            const isOther = selected && selected !== arc.key;
            return (
              <g key={`label-${arc.key}`} style={{ pointerEvents: "none", opacity: isOther ? 0.2 : 1, transition: "opacity 0.3s" }}>
                <text x={label.x} y={label.y - 5} textAnchor="middle" fill="white" style={{ fontSize: 9, fontWeight: 700, fontFamily: "var(--font-mono)", textShadow: "0 1px 3px rgba(0,0,0,0.8)" }}>
                  {fmtShort(label.value)}
                </text>
                <text x={label.x} y={label.y + 7} textAnchor="middle" fill="rgba(255,255,255,0.8)" style={{ fontSize: 8, fontWeight: 500, fontFamily: "var(--font-mono)", textShadow: "0 1px 3px rgba(0,0,0,0.8)" }}>
                  {fmt(label.pct * 100, 1)}%
                </text>
              </g>
            );
          })}
          {/* Center clickable area */}
          <circle cx={cx} cy={cy} r={innerR - 4} fill="transparent" style={{ cursor: "pointer" }} onClick={handleCenterClick} />
          {/* Center text */}
          <text x={cx} y={cy - 14} textAnchor="middle" fill="var(--text-muted)" style={{ fontSize: 11, fontFamily: "var(--font)" }}>
            {selected || "Загалом"}
          </text>
          <text x={cx} y={cy + 10} textAnchor="middle" fill="var(--text-primary)" style={{ fontSize: 22, fontWeight: 700, fontFamily: "var(--font-mono)" }}>
            {fmt(selected ? (selectedSlice?.value || 0) : grandTotal, 0)}
          </text>
          <text x={cx} y={cy + 28} textAnchor="middle" fill="var(--text-muted)" style={{ fontSize: 12, fontFamily: "var(--font)" }}>
            ₴
          </text>
        </svg>
      </div>

      {/* Legend */}
      <div className="pie-legend">
        {arcs.map(arc => {
          if (arc.pct <= 0) return null;
          const isSelected = selected === arc.key;
          return (
            <div
              key={arc.key}
              className={`pie-legend-item ${isSelected ? 'active' : ''}`}
              onClick={() => handleSliceClick(arc.key)}
            >
              <div className="pie-legend-dot" style={{ background: PIE_COLORS[arc.key], opacity: (selected && !isSelected) ? 0.3 : 1 }} />
              <div className="pie-legend-label">{arc.key}</div>
              <div className="pie-legend-value" style={{ opacity: (selected && !isSelected) ? 0.3 : 1 }}>
                {fmt(arc.pct * 100, 1)}%
              </div>
            </div>
          );
        })}
      </div>

      {/* Clickable title -> all assets list */}
      <div className="section-title clickable-title" style={{ marginTop: 16 }} onClick={onTitleClick}>
        {selected === null && "Усі активи ›"}
        {selected === "Кеш" && "Грошові кошти"}
        {selected === "Нараховані %" && "Нараховані відсотки"}
        {selected && selected.startsWith("Облігації") && selected}
      </div>

      {filteredHoldings === "cash" ? (
        <div className="card">
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ color: "var(--text-secondary)", fontSize: 13 }}>UAH</span>
            <span style={{ fontWeight: 700, fontFamily: "var(--font-mono)" }}>{fmt(account.balanceUah)} ₴</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ color: "var(--text-secondary)", fontSize: 13 }}>USD</span>
            <span style={{ fontWeight: 700, fontFamily: "var(--font-mono)" }}>${fmt(account.balanceUsd)}</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span style={{ color: "var(--text-secondary)", fontSize: 13 }}>EUR</span>
            <span style={{ fontWeight: 700, fontFamily: "var(--font-mono)" }}>€{fmt(account.balanceEur)}</span>
          </div>
        </div>
      ) : filteredHoldings === "accrued" ? (
        <div className="card">
          {holdings.map(h => {
            const sec = getSecurityByIsin(h.isin);
            if (!sec) return null;
            const daysSinceCoupon = Math.max(1, Math.floor((new Date() - new Date(sec.issueDate)) / (1000*60*60*24)) % (sec.couponFrequency === "quarterly" ? 90 : 180));
            const dailyCoupon = (sec.couponRate / 100 * sec.faceValue) / 365;
            const accrued = dailyCoupon * daysSinceCoupon * h.quantity;
            const sym = sec.currency === "UAH" ? "₴" : sec.currency === "USD" ? "$" : "€";
            return (
              <div key={h.holdingId} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid var(--border-light)" }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{sec.name}</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)" }}>{daysSinceCoupon} днів × {h.quantity} шт.</div>
                </div>
                <div style={{ fontWeight: 700, fontFamily: "var(--font-mono)", color: "var(--green)", alignSelf: "center" }}>
                  +{fmt(accrued)} {sym}
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        (filteredHoldings || []).map(h => {
          const sec = getSecurityByIsin(h.isin);
          if (!sec) return null;
          const unrealized = (sec.bid - h.avgPurchasePrice) * h.quantity;
          const sym = sec.currency === "UAH" ? "₴" : sec.currency === "USD" ? "$" : "€";
          return (
            <div className="holding-row" key={h.holdingId} onClick={() => navigate("security", sec.isin)}>
              <div className="holding-top">
                <div>
                  <div className="holding-name">
                    {sec.type === "military_bond" && <span className="tag tag-military" style={{ marginRight: 6 }}>ВО</span>}
                    {sec.type === "corporate" && <span className="tag tag-corp" style={{ marginRight: 6 }}>Корп</span>}
                    {sec.name}
                  </div>
                  <div className="holding-qty">{h.quantity} шт. × {fmt(h.avgPurchasePrice)} {sym}</div>
                </div>
                <div className="holding-pnl">
                  <div className={`holding-pnl-value ${unrealized >= 0 ? 'positive' : 'negative'}`}>
                    {unrealized >= 0 ? '+' : ''}{fmt(unrealized)} {sym}
                  </div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 2 }}>
                    Купон: +{fmt(h.totalInterestEarned)} {sym}
                  </div>
                </div>
              </div>
              <div className="holding-bottom">
                <span>Bid: {fmt(sec.bid)}</span>
                <span>Ask: {fmt(sec.ask)}</span>
                <span>YTM: {fmt(sec.yieldToMaturity, 1)}%</span>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

function CashFlowBarChart({ data, onBarClick }) {
  const maxVal = Math.max(...data.map(d => d.settlements + d.coupons + d.gracePayments), 1);

  return (
    <div className="bar-chart-container">
      <div className="bar-chart-row">
        {data.map((d, i) => {
          const settleH = (d.settlements / maxVal) * 150;
          const couponH = (d.coupons / maxVal) * 150;
          const graceH = (d.gracePayments / maxVal) * 150;
          return (
            <div className="bar-group" key={d.month} onClick={() => onBarClick && onBarClick(d.month)}>
              <div className="bar-stack">
                {graceH > 0 && (
                  <div className="bar-segment" style={{
                    height: graceH,
                    background: `repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(239,68,68,0.3) 2px, rgba(239,68,68,0.3) 4px)`,
                    border: "1px dashed rgba(239,68,68,0.4)",
                    borderRadius: "3px 3px 0 0",
                  }} />
                )}
                {couponH > 0 && (

// ============================================================
// YIELD CURVE COMPONENT
// ============================================================
function YieldCurveChart({ securities, title }) {
  const sortedSecs = [...securities]
    .filter(s => s.maturityDate && s.yieldToMaturity)
    .sort((a, b) => new Date(a.maturityDate) - new Date(b.maturityDate));

  if (sortedSecs.length === 0) return <div className="card" style={{ textAlign: "center", color: "var(--text-muted)" }}>Немає даних</div>;

  const now = new Date();
  const points = sortedSecs.map(s => ({
    years: Math.max(0.1, (new Date(s.maturityDate) - now) / (365.25 * 24 * 60 * 60 * 1000)),
    ytm: s.yieldToMaturity,
    name: s.name,
    isin: s.isin,
  }));

  const minY = Math.floor(Math.min(...points.map(p => p.ytm)) - 1);
  const maxY = Math.ceil(Math.max(...points.map(p => p.ytm)) + 1);
  const maxX = Math.ceil(Math.max(...points.map(p => p.years)) + 0.5);

  const w = 360, h = 200, padL = 40, padR = 20, padT = 20, padB = 30;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;

  const toX = (years) => padL + (years / maxX) * chartW;
  const toY = (ytm) => padT + chartH - ((ytm - minY) / (maxY - minY)) * chartH;

  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${toX(p.years)} ${toY(p.ytm)}`).join(' ');

  return (
    <div className="card" style={{ padding: 12, overflow: "hidden" }}>
      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>{title}</div>
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: "block", margin: "0 auto" }}>
        {/* Grid lines */}
        {Array.from({ length: 5 }, (_, i) => {
          const y = minY + (i / 4) * (maxY - minY);
          const py = toY(y);
          return (
            <g key={`grid-${i}`}>
              <line x1={padL} y1={py} x2={w - padR} y2={py} stroke="var(--border-light)" strokeWidth="1" />
              <text x={padL - 4} y={py + 3} textAnchor="end" fill="var(--text-muted)" style={{ fontSize: 9, fontFamily: "var(--font-mono)" }}>
                {fmt(y, 0)}%
              </text>
            </g>
          );
        })}
        {/* X axis labels */}
        {Array.from({ length: Math.min(5, Math.ceil(maxX)) }, (_, i) => {
          const xVal = (i + 1);
          if (xVal > maxX) return null;
          return (
            <text key={`x-${i}`} x={toX(xVal)} y={h - 5} textAnchor="middle" fill="var(--text-muted)" style={{ fontSize: 9, fontFamily: "var(--font-mono)" }}>
              {xVal}р
            </text>
          );
        })}
        {/* Curve line */}
        <path d={linePath} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {/* Data points */}
        {points.map((p, i) => (
          <g key={i}>
            <circle cx={toX(p.years)} cy={toY(p.ytm)} r={5} fill="var(--bg-primary)" stroke="var(--accent)" strokeWidth="2" />
            <text x={toX(p.years)} y={toY(p.ytm) - 10} textAnchor="middle" fill="var(--text-primary)" style={{ fontSize: 9, fontWeight: 600, fontFamily: "var(--font-mono)" }}>
              {fmt(p.ytm, 1)}%
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}

// ============================================================
// WATERFALL CHART COMPONENT
// ============================================================
function WaterfallChart({ data, title, height = 180 }) {
  const maxVal = Math.max(...data.map(d => Math.abs(d.value)));
  const w = 360, h = height, padL = 50, padR = 10, padT = 20, padB = 50;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;
  const barW = Math.min(30, chartW / data.length - 8);

  let running = 0;
  const bars = data.map((d, i) => {
    const isTotal = d.isTotal;
    const startVal = isTotal ? 0 : running;
    const endVal = isTotal ? d.value : running + d.value;
    running = endVal;
    return { ...d, startVal, endVal, running };
  });

  const allValues = bars.flatMap(b => [b.startVal, b.endVal]);
  const minVal = Math.min(0, ...allValues);
  const maxValChart = Math.max(...allValues) * 1.1;

  const toY = (v) => padT + chartH - ((v - minVal) / (maxValChart - minVal)) * chartH;
  const toX = (i) => padL + (i / data.length) * chartW + (chartW / data.length - barW) / 2;

  return (
    <div style={{ overflow: "hidden" }}>
      {title && <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8, color: "var(--text-secondary)" }}>{title}</div>}
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: "block" }}>
        {/* Zero line */}
        <line x1={padL} y1={toY(0)} x2={w - padR} y2={toY(0)} stroke="var(--border)" strokeWidth="1" />
        {bars.map((b, i) => {
          const y1 = toY(Math.max(b.startVal, b.endVal));
          const y2 = toY(Math.min(b.startVal, b.endVal));
          const barH = Math.max(2, y2 - y1);
          const color = b.isTotal ? "var(--accent)" : b.value >= 0 ? "var(--green)" : "var(--red)";
          return (
            <g key={i}>
              <rect x={toX(i)} y={y1} width={barW} height={barH} fill={color} rx={2} opacity={0.85} />
              <text x={toX(i) + barW / 2} y={y1 - 4} textAnchor="middle" fill="var(--text-primary)" style={{ fontSize: 8, fontFamily: "var(--font-mono)", fontWeight: 600 }}>
                {fmtShort(Math.abs(b.value))}
              </text>
              <text x={toX(i) + barW / 2} y={h - padB + 12} textAnchor="middle" fill="var(--text-muted)" style={{ fontSize: 7, fontFamily: "var(--font)" }} transform={`rotate(-30, ${toX(i) + barW / 2}, ${h - padB + 12})`}>
                {b.label}
              </text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// ============================================================
// SIMPLE PIE CHART (for Balance Sheet composition)
// ============================================================
function SimplePieChart({ data, size = 140 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  const cx = size / 2, cy = size / 2, r = size / 2 - 8;

  let cumAngle = -90;
  const arcs = data.map(d => {
    const pct = total > 0 ? d.value / total : 0;
    const angle = pct * 360;
    const startAngle = cumAngle;
    const endAngle = cumAngle + angle;
    cumAngle = endAngle;
    return { ...d, pct, startAngle, endAngle };
  });

  const describeArc = (start, end) => {
    const toRad = a => (a * Math.PI) / 180;
    const large = end - start > 180 ? 1 : 0;
    const x1 = cx + r * Math.cos(toRad(start));
    const y1 = cy + r * Math.sin(toRad(start));
    const x2 = cx + r * Math.cos(toRad(end));
    const y2 = cy + r * Math.sin(toRad(end));
    return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
  };

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {arcs.map((a, i) => a.pct > 0 && (
          <path key={i} d={describeArc(a.startAngle, a.endAngle - 0.3)} fill={a.color} opacity={0.85} />
        ))}
      </svg>
      <div style={{ flex: 1 }}>
        {data.map((d, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: d.color, flexShrink: 0 }} />
            <span style={{ fontSize: 10, color: "var(--text-secondary)", flex: 1 }}>{d.label}</span>
            <span style={{ fontSize: 10, fontFamily: "var(--font-mono)", fontWeight: 600 }}>{fmt(d.value / total * 100, 0)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

  const [tab, setTab] = useState("government"); // government | corporate

  const govSecurities = MOCK_SECURITIES.filter(s => s.category === "government");
  const corpSecurities = MOCK_SECURITIES.filter(s => s.category === "corporate");

  return (
    <div className="page animate-in" style={{ paddingTop: 16 }}>
      {/* Tab switcher */}
      <div className="tab-switcher">
        <button className={`tab-btn ${tab === "government" ? "active" : ""}`} onClick={() => setTab("government")}>Державні</button>
        <button className={`tab-btn ${tab === "corporate" ? "active" : ""}`} onClick={() => setTab("corporate")}>Корпоративні</button>
      </div>

      {tab === "government" && (
        <div className="animate-in">
          {/* Government securities table */}
          <div className="card" style={{ padding: 8, overflow: "auto" }}>
            <table className="sec-table">
              <thead>
                <tr>
                  <th>ISIN</th>
                  <th>Погашення</th>
                  <th>Bid</th>
                  <th>Ask</th>
                  <th>YTM</th>
                </tr>
              </thead>
              <tbody>
                {govSecurities.map(s => {
                  const inPortf = isInPortfolio(s.isin);
                  return (
                    <tr key={s.isin}>
                      <td>
                        <div style={{ fontSize: 11, fontWeight: 600, fontFamily: "var(--font)" }}>{s.name}</div>
                        <div style={{ fontSize: 10, color: "var(--text-muted)" }}>{s.isin}</div>
                      </td>
                      <td style={{ fontSize: 11 }}>{fmtDate(s.maturityDate)}</td>
                      <td>
                        <span className={inPortf ? "bid-link" : "bid-inactive"} onClick={() => inPortf && navigate("security", s.isin)}>
                          {fmt(s.bid)}
                        </span>
                      </td>
                      <td className="ask-link">{fmt(s.ask)}</td>
                      <td style={{ color: "var(--green)", fontWeight: 600 }}>{fmt(s.yieldToMaturity, 1)}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Yield Curve button */}
          <button className="btn btn-secondary" style={{ marginTop: 12 }} onClick={() => navigate("yieldCurveGov")}>
            <Icon d={Icons.trendingUp} size={16} /> Крива доходності
          </button>
        </div>
      )}

      {tab === "corporate" && (
        <div className="animate-in">
          {/* Corporate securities table */}
          <div className="card" style={{ padding: 8, overflow: "auto" }}>
            <table className="sec-table">
              <thead>
                <tr>
                  <th>ISIN / Емітент</th>
                  <th>Погашення</th>
                  <th>Bid</th>
                  <th>Ask</th>
                  <th>YTM</th>
                </tr>
              </thead>
              <tbody>
                {corpSecurities.map(s => {
                  const inPortf = isInPortfolio(s.isin);
                  return (
                    <tr key={s.isin}>
                      <td>
                        <div style={{ fontSize: 11, fontWeight: 600, fontFamily: "var(--font)", cursor: "pointer", color: "var(--blue)" }}
                          onClick={() => navigate("issuer", s.issuerId)}>
                          {s.issuerName}
                        </div>
                        <div style={{ fontSize: 10, color: "var(--text-muted)", cursor: "pointer" }}
                          onClick={() => navigate("issuer", s.issuerId)}>
                          {s.isin}
                        </div>
                      </td>
                      <td style={{ fontSize: 11 }}>{fmtDate(s.maturityDate)}</td>
                      <td>
                        <span className={inPortf ? "bid-link" : "bid-inactive"} onClick={() => inPortf && navigate("security", s.isin)}>
                          {fmt(s.bid)}
                        </span>
                      </td>
                      <td className="ask-link">{fmt(s.ask)}</td>
                      <td style={{ color: "var(--green)", fontWeight: 600 }}>{fmt(s.yieldToMaturity, 1)}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Yield Curve button */}
          <button className="btn btn-secondary" style={{ marginTop: 12 }} onClick={() => navigate("yieldCurveCorp")}>
            <Icon d={Icons.trendingUp} size={16} /> Крива доходності
          </button>
        </div>
      )}
    </div>
  );
}

// --- YIELD CURVE PAGE ---
function YieldCurvePage({ type, goBack }) {
  const isGov = type === "government";
  const secs = MOCK_SECURITIES.filter(s => s.category === (isGov ? "government" : "corporate") && s.currency === "UAH");
  const title = isGov ? "Крива доходності державних облігацій" : "Крива доходності корпоративних облігацій";

  return (
    <div className="page animate-in" style={{ paddingTop: 16 }}>
      <YieldCurveChart securities={secs} title={title} />
      {!isGov && (
        <>
          <div style={{ marginTop: 16 }}>
            <YieldCurveChart
              securities={MOCK_SECURITIES.filter(s => s.category === "corporate" && s.currency === "USD")}
              title="Крива доходності (USD)"
            />
          </div>
        </>
      )}
    </div>
  );
}

// --- ISSUER DETAIL PAGE ---
function IssuerPage({ issuerId, navigate, goBack }) {
  const issuer = MOCK_ISSUERS[issuerId];
  const issuerSecurities = MOCK_SECURITIES.filter(s => s.issuerId === issuerId);
  const [viewMode, setViewMode] = useState("table"); // table | chart
  const [finSection, setFinSection] = useState("pnl"); // pnl | balance | cfl

  if (!issuer) return <div className="page" style={{ padding: 40, textAlign: "center", color: "var(--text-muted)" }}>Емітента не знайдено</div>;

  const f = issuer.financials;
  const lastYear = f.years[f.years.length - 1];

  return (
    <div className="page animate-in" style={{ paddingTop: 16 }}>
      {/* Issuer header */}
      <div className="card" style={{ textAlign: "center" }}>
        <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>{issuer.name}</div>
        <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 8 }}>{issuer.sector}</div>
        <div style={{ fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.5 }}>{issuer.description}</div>
      </div>

      {/* Securities of this issuer */}
      <div className="issuer-section">
        <div className="issuer-section-title">
          <Icon d={Icons.briefcase} size={14} color="var(--text-muted)" />
          Цінні папери емітента
        </div>
        {issuerSecurities.map(s => (
          <div key={s.isin} className="card card-clickable" style={{ padding: "12px 16px" }}
            onClick={() => navigate("security", s.isin)}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{s.name}</div>
                <div style={{ fontSize: 11, color: "var(--text-muted)", fontFamily: "var(--font-mono)", marginTop: 2 }}>{s.isin}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: "var(--green)", fontFamily: "var(--font-mono)" }}>{fmt(s.yieldToMaturity, 1)}%</div>
                <div style={{ fontSize: 10, color: "var(--text-muted)" }}>YTM</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 8, fontSize: 11, color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>
              <span>Номінал: {fmt(s.faceValue, 0)} {s.currency === "UAH" ? "₴" : "$"}</span>
              <span>Купон: {fmt(s.couponRate, 1)}%</span>
              <span>{s.couponFrequency === "quarterly" ? "Щокварт." : "Раз/півроку"}</span>
            </div>
            {s.offerDates && s.offerDates.length > 0 && (
              <div style={{ fontSize: 10, color: "var(--text-muted)", marginTop: 4 }}>
                Оферти: {s.offerDates.map(d => fmtDate(d)).join(", ")}
              </div>
            )}
            <div style={{ fontSize: 10, color: "var(--text-muted)", marginTop: 2 }}>
              Обсяг випуску: {fmtShort(s.issueVolume)} {s.currency === "UAH" ? "₴" : "$"}
            </div>
            <div style={{ marginTop: 6 }}>
              <span style={{ fontSize: 10, color: "var(--blue)", cursor: "pointer" }}
                onClick={(e) => { e.stopPropagation(); }}>
                <Icon d={Icons.externalLink} size={10} color="var(--blue)" /> Проспект емісії
              </span>
            </div>
          </div>
        ))}
      </div>

      {/* Financial Reports */}
      <div className="issuer-section">
        <div className="issuer-section-title">
          <Icon d={Icons.fileText} size={14} color="var(--text-muted)" />
          Звітність емітента
        </div>

        {/* Official report link */}
        <div className="card" style={{ padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 13 }}>Офіційна звітність (з підписами)</span>
          <span style={{ color: "var(--blue)", fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
            <Icon d={Icons.externalLink} size={12} color="var(--blue)" /> PDF
          </span>
        </div>

        {/* View mode toggle */}
        <div className="tab-switcher" style={{ marginTop: 8 }}>
          <button className={`tab-btn ${viewMode === "table" ? "active" : ""}`} onClick={() => setViewMode("table")}>Таблиця</button>
          <button className={`tab-btn ${viewMode === "chart" ? "active" : ""}`} onClick={() => setViewMode("chart")}>Графіки</button>
        </div>

        {viewMode === "table" && (
          <div className="animate-in">
            {/* Financial section tabs */}
            <div style={{ display: "flex", gap: 8, marginBottom: 12, overflow: "auto" }}>
              {[["pnl", "P&L"], ["balance", "Баланс"], ["cfl", "Cash Flow"]].map(([key, label]) => (
                <button key={key} className={`filter-btn ${finSection === key ? "active" : ""}`} onClick={() => setFinSection(key)}>
                  {label}
                </button>
              ))}
            </div>

            {finSection === "pnl" && (
              <div className="card" style={{ padding: 8, overflow: "auto" }}>
                <table className="fin-table">
                  <thead>
                    <tr>
                      <th>Показник (млн ₴)</th>
                      {f.years.map(y => <th key={y}>{y}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    <tr><td>Виручка</td>{f.revenue.map((v, i) => <td key={i}>{fmtShort(v)}</td>)}</tr>
                    <tr><td>Собівартість</td>{f.costOfSales.map((v, i) => <td key={i}>({fmtShort(v)})</td>)}</tr>
                    <tr className="highlight"><td>Валовий прибуток</td>{f.grossProfit.map((v, i) => <td key={i}>{fmtShort(v)}</td>)}</tr>
                    <tr><td>Операційні витрати</td>{f.operatingExpenses.map((v, i) => <td key={i}>({fmtShort(v)})</td>)}</tr>
                    <tr className="highlight"><td>EBITDA</td>{f.ebitda.map((v, i) => <td key={i}>{fmtShort(v)}</td>)}</tr>
                    <tr className="highlight"><td>Чистий прибуток</td>{f.netIncome.map((v, i) => <td key={i} style={{ color: "var(--green)" }}>{fmtShort(v)}</td>)}</tr>
                  </tbody>
                </table>
              </div>
            )}

            {finSection === "balance" && (
              <div className="card" style={{ padding: 8, overflow: "auto" }}>
                <table className="fin-table">
                  <thead>
                    <tr>
                      <th>Показник (млн ₴)</th>
                      {f.years.map(y => <th key={y}>{y}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    <tr className="highlight"><td>Всього активів</td>{f.totalAssets.map((v, i) => <td key={i}>{fmtShort(v)}</td>)}</tr>
                    <tr><td>Оборотні активи</td>{f.currentAssets.map((v, i) => <td key={i}>{fmtShort(v)}</td>)}</tr>
                    <tr><td>Основні засоби</td>{f.fixedAssets.map((v, i) => <td key={i}>{fmtShort(v)}</td>)}</tr>
                    <tr className="highlight"><td>Всього зобовʼязань</td>{f.totalLiabilities.map((v, i) => <td key={i}>{fmtShort(v)}</td>)}</tr>
                    <tr><td>Поточні зобовʼязання</td>{f.currentLiabilities.map((v, i) => <td key={i}>{fmtShort(v)}</td>)}</tr>
                    <tr><td>Довгостроковий борг</td>{f.longTermDebt.map((v, i) => <td key={i}>{fmtShort(v)}</td>)}</tr>
                    <tr className="highlight"><td>Власний капітал</td>{f.equity.map((v, i) => <td key={i} style={{ color: "var(--green)" }}>{fmtShort(v)}</td>)}</tr>
                  </tbody>
                </table>
              </div>
            )}

            {finSection === "cfl" && (
              <div className="card" style={{ padding: 8, overflow: "auto" }}>
                <table className="fin-table">
                  <thead>
                    <tr>
                      <th>Показник (млн ₴)</th>
                      {f.years.map(y => <th key={y}>{y}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    <tr className="highlight"><td>Операційний CF</td>{f.operatingCashFlow.map((v, i) => <td key={i} style={{ color: "var(--green)" }}>{fmtShort(v)}</td>)}</tr>
                    <tr><td>Інвестиційний CF</td>{f.investingCashFlow.map((v, i) => <td key={i} style={{ color: "var(--red)" }}>{fmtShort(v)}</td>)}</tr>
                    <tr><td>Фінансовий CF</td>{f.financingCashFlow.map((v, i) => <td key={i} style={{ color: v < 0 ? "var(--red)" : "var(--green)" }}>{fmtShort(v)}</td>)}</tr>
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {viewMode === "chart" && (
          <div className="animate-in">
            {/* Revenue to Net Income waterfall */}
            <div className="card" style={{ padding: 12 }}>
              <WaterfallChart
                title={`Від виручки до чистого прибутку (${lastYear})`}
                data={[
                  { label: "Виручка", value: f.revenue[2], isTotal: true },
                  { label: "Собівартість", value: -f.costOfSales[2] },
                  { label: "Опер. витрати", value: -f.operatingExpenses[2] },
                  { label: "Інше", value: f.netIncome[2] - f.grossProfit[2] + f.operatingExpenses[2] },
                  { label: "Чистий прибуток", value: f.netIncome[2], isTotal: true },
                ]}
              />
            </div>

            {/* Assets composition pie */}
            <div className="card" style={{ padding: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 12, color: "var(--text-secondary)" }}>Склад активів ({lastYear})</div>
              <SimplePieChart data={[
                { label: "Основні засоби", value: f.fixedAssets[2], color: "var(--accent)" },
                { label: "Оборотні активи", value: f.currentAssets[2], color: "var(--blue)" },
              ]} />
            </div>

            {/* Liabilities composition pie */}
            <div className="card" style={{ padding: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 12, color: "var(--text-secondary)" }}>Склад зобовʼязань ({lastYear})</div>
              <SimplePieChart data={[
                { label: "Власний капітал", value: f.equity[2], color: "var(--green)" },
                { label: "Довгостроковий борг", value: f.longTermDebt[2], color: "var(--yellow)" },
                { label: "Поточні зобовʼязання", value: f.currentLiabilities[2], color: "var(--red)" },
              ]} />
            </div>

            {/* Net Income to Operating CF waterfall */}
            <div className="card" style={{ padding: 12 }}>
              <WaterfallChart
                title={`Від чистого прибутку до опер. CF (${lastYear})`}
                data={[
                  { label: "Чистий прибуток", value: f.netIncome[2], isTotal: true },
                  { label: "Амортизація", value: f.depreciation[2] },
                  { label: "Зміна WC", value: f.workingCapitalChange[2] },
                  { label: "Інше", value: f.operatingCashFlow[2] - f.netIncome[2] - f.depreciation[2] - f.workingCapitalChange[2] },
                  { label: "Опер. CF", value: f.operatingCashFlow[2], isTotal: true },
                ]}
              />
            </div>
          </div>
        )}
      </div>

      {/* Issuer News */}
      <div className="issuer-section">
        <div className="issuer-section-title">
          <Icon d={Icons.newspaper} size={14} color="var(--text-muted)" />
          Новини емітента
        </div>
        <div className="card" style={{ padding: "0 16px" }}>
          {issuer.news.map((n, i) => (
            <div className="news-item" key={i}>
              <div className="news-date">{fmtDate(n.date)}</div>
              <div className="news-title">{n.title}</div>
              <div className="news-body">{n.body}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// --- CATALOG ---
function CatalogPage({ navigate }) {
  const [securities, setSecurities] = useState([]);
  const [filter, setFilter] = useState("all");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    API.securities.list().then(s => { setSecurities(s); setLoading(false); });
  }, []);

  const filtered = securities.filter(s => {
    if (filter === "all") return true;
    if (filter === "uah") return s.currency === "UAH" && s.type !== "military_bond";
    if (filter === "usd") return s.currency === "USD";
    if (filter === "eur") return s.currency === "EUR";
    if (filter === "military") return s.type === "military_bond";
    if (filter === "corporate") return s.type === "corporate";
    return true;
  });

  return (
    <div className="animate-in">
      <div className="filters">
        {[["all", "Усі"], ["uah", "UAH"], ["usd", "USD"], ["eur", "EUR"], ["military", "Військові"], ["corporate", "Корп."]].map(([key, label]) => (
          <button key={key} className={`filter-btn ${filter === key ? 'active' : ''}`} onClick={() => setFilter(key)}>{label}</button>
        ))}
      </div>

      {loading ? (
        <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><div className="loading-spinner" /></div>
      ) : (
        filtered.map(s => (
          <div className="security-row" key={s.isin} onClick={() => navigate("security", s.isin)}>
            <div className="security-info">
              <div className="security-name">
                {s.type === "military_bond" && <span className="tag tag-military" style={{ marginRight: 6 }}>ВО</span>}
                {s.type === "corporate" && <span className="tag tag-corp" style={{ marginRight: 6 }}>Корп</span>}
                <span className={`tag tag-${s.currency.toLowerCase()}`} style={{ marginRight: 6 }}>{s.currency}</span>
                {s.name}
              </div>
              <div className="security-meta">{s.isin} · Погашення {fmtDate(s.maturityDate)}</div>
            </div>
            <div className="security-right">
              <div className="security-yield">{fmt(s.yieldToMaturity, 1)}%</div>
              <div className="security-price">Ask: {fmt(s.ask)}</div>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

// --- SECURITY DETAIL ---
function SecurityDetailPage({ isin, navigate, goBack }) {
  const [sec, setSec] = useState(null);
  const [showBuy, setShowBuy] = useState(false);
  const [showSell, setShowSell] = useState(false);
  const [qty, setQty] = useState(1);
  const [tradeSuccess, setTradeSuccess] = useState(null);
  const [loading, setLoading] = useState(false);

  const holding = MOCK_HOLDINGS.find(h => h.isin === isin);

  useEffect(() => {
    API.securities.get(isin).then(setSec);
  }, [isin]);

  if (!sec) return <div style={{ display: "flex", justifyContent: "center", padding: 80 }}><div className="loading-spinner" /></div>;

  const handleTrade = async (side) => {
    setLoading(true);
    if (side === "buy") await API.trade.buy(isin, qty);
    else await API.trade.sell(isin, qty);
    setLoading(false);
    setShowBuy(false);
    setShowSell(false);
    setTradeSuccess(side);
    setTimeout(() => setTradeSuccess(null), 3000);
  };

  const currSymbol = sec.currency === "UAH" ? "₴" : sec.currency === "USD" ? "$" : "€";

  return (
    <div className="animate-in" style={{ paddingBottom: 80 }}>
      <div className="detail-hero">
        <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 8 }}>
          {sec.type === "military_bond" && <span className="tag tag-military">Військова</span>}
          {sec.type === "corporate" && <span className="tag tag-corp">Корпоративна</span>}
          <span className={`tag tag-${sec.currency.toLowerCase()}`}>{sec.currency}</span>
        </div>
        <div className="detail-name">{sec.name}</div>
        <div className="detail-isin">{sec.isin}</div>
        <div className="detail-yield-big">{fmt(sec.yieldToMaturity, 1)}%</div>
        <div className="detail-yield-label">Дохідність до погашення</div>
      </div>

      <div className="detail-grid">
        <div className="detail-cell">
          <div className="detail-cell-label">Bid</div>
          <div className="detail-cell-value">{fmt(sec.bid)} {currSymbol}</div>
        </div>
        <div className="detail-cell">
          <div className="detail-cell-label">Ask</div>
          <div className="detail-cell-value">{fmt(sec.ask)} {currSymbol}</div>
        </div>
        <div className="detail-cell">
          <div className="detail-cell-label">Купон</div>
          <div className="detail-cell-value">{fmt(sec.couponRate, 1)}%</div>
        </div>
        <div className="detail-cell">
          <div className="detail-cell-label">Номінал</div>
          <div className="detail-cell-value">{fmt(sec.faceValue, 0)} {currSymbol}</div>
        </div>
        <div className="detail-cell">
          <div className="detail-cell-label">Дата погашення</div>
          <div className="detail-cell-value">{fmtDate(sec.maturityDate)}</div>
        </div>
        <div className="detail-cell">
          <div className="detail-cell-label">Наступний купон</div>
          <div className="detail-cell-value">{fmtDate(sec.nextCouponDate)}</div>
        </div>
        <div className="detail-cell">
          <div className="detail-cell-label">Виплата купону</div>
          <div className="detail-cell-value">{sec.couponFrequency === "quarterly" ? "Щоквартально" : "Раз на півроку"}</div>
        </div>
        <div className="detail-cell">
          <div className="detail-cell-label">Дата випуску</div>
          <div className="detail-cell-value">{fmtDate(sec.issueDate)}</div>
        </div>
      </div>

      {/* Corporate bond extra info */}
      {sec.type === "corporate" && sec.issuerId && (
        <div style={{ padding: "0 20px" }}>
          <button className="btn btn-secondary btn-sm" style={{ width: "100%", marginBottom: 12 }}
            onClick={() => navigate("issuer", sec.issuerId)}>
            <Icon d={Icons.user} size={14} /> Сторінка емітента: {sec.issuerName}
          </button>
        </div>
      )}

      {holding && (
        <div style={{ padding: "0 20px" }}>
          <div className="section-title">Ваша позиція</div>
          <div className="card">
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ color: "var(--text-secondary)", fontSize: 13 }}>Кількість</span>
              <span style={{ fontWeight: 600, fontFamily: "var(--font-mono)" }}>{holding.quantity} шт.</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ color: "var(--text-secondary)", fontSize: 13 }}>Середня ціна купівлі</span>
              <span style={{ fontWeight: 600, fontFamily: "var(--font-mono)" }}>{fmt(holding.avgPurchasePrice)} {currSymbol}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ color: "var(--text-secondary)", fontSize: 13 }}>Нереалізований P&L</span>
              <span style={{ fontWeight: 700, fontFamily: "var(--font-mono)", color: "var(--green)" }}>
                +{fmt((sec.bid - holding.avgPurchasePrice) * holding.quantity)} {currSymbol}
              </span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ color: "var(--text-secondary)", fontSize: 13 }}>Отримано купонів</span>
              <span style={{ fontWeight: 700, fontFamily: "var(--font-mono)", color: "var(--green)" }}>
                +{fmt(holding.totalInterestEarned)} {currSymbol}
              </span>
            </div>
          </div>
        </div>
      )}

      <div style={{ padding: "0 20px" }}>
        <div className="section-title">Історія ціни</div>
        <div className="card" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 100 }}>
          <MiniChart />
          <span style={{ marginLeft: 12, color: "var(--text-muted)", fontSize: 12 }}>Графік (демо)</span>
        </div>
      </div>

      <div className="trade-panel">
        {tradeSuccess && (
          <div style={{ textAlign: "center", marginBottom: 12, color: "var(--green)", fontWeight: 600 }}>
            ✓ {tradeSuccess === "buy" ? "Купівлю" : "Продаж"} виконано!
          </div>
        )}
        <div className="trade-actions">
          <button className="btn btn-green" style={{ flex: 1 }} onClick={() => setShowBuy(true)}>Купити</button>
          {holding && <button className="btn btn-red" style={{ flex: 1 }} onClick={() => setShowSell(true)}>Продати</button>}
        </div>
      </div>

      {(showBuy || showSell) && (
        <div className="modal-overlay" onClick={() => { setShowBuy(false); setShowSell(false); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">{showBuy ? "Купити" : "Продати"} {sec.name}</div>
            <div className="input-group">
              <label>Кількість (шт.)</label>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn btn-secondary btn-sm" onClick={() => setQty(Math.max(1, qty - 1))}>−</button>
                <input type="number" value={qty} onChange={e => setQty(Math.max(1, parseInt(e.target.value) || 1))} min={1} style={{ textAlign: "center" }} />
                <button className="btn btn-secondary btn-sm" onClick={() => setQty(qty + 1)}>+</button>
              </div>
            </div>
            <div className="card" style={{ marginTop: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ color: "var(--text-secondary)", fontSize: 13 }}>Ціна за 1 шт.</span>
                <span style={{ fontFamily: "var(--font-mono)" }}>{fmt(showBuy ? sec.ask : sec.bid)} {currSymbol}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", borderTop: "1px solid var(--border-light)", paddingTop: 8 }}>
                <span style={{ fontWeight: 600 }}>Сума</span>
                <span style={{ fontWeight: 700, fontFamily: "var(--font-mono)", fontSize: 18 }}>
                  {fmt((showBuy ? sec.ask : sec.bid) * qty)} {currSymbol}
                </span>
              </div>
            </div>
            <button
              className={`btn ${showBuy ? 'btn-green' : 'btn-red'}`}
              style={{ marginTop: 16 }}
              onClick={() => handleTrade(showBuy ? "buy" : "sell")}
              disabled={loading}
            >
              {loading ? <div className="loading-spinner" /> : `${showBuy ? "Купити" : "Продати"} ${qty} шт.`}
            </button>
            <button className="btn btn-secondary" style={{ marginTop: 8 }} onClick={() => { setShowBuy(false); setShowSell(false); }}>
              Скасувати
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// --- DEPOSIT PAGE ---
function DepositPage({ goBack }) {
  const [amount, setAmount] = useState("");
  const [currency, setCurrency] = useState("UAH");
  const [method, setMethod] = useState("card");
  const [isCredit, setIsCredit] = useState(false);
  const [drawdownDate, setDrawdownDate] = useState("");
  const [graceDays, setGraceDays] = useState("55");
  const [loading, setLoading] = useState(false);
  const [success, setSuccess] = useState(false);

  const handleDeposit = async () => {
    setLoading(true);
    await API.deposit(parseFloat(amount), currency, method, isCredit ? { drawdownDate, graceDays: parseInt(graceDays) } : null);
    setLoading(false);
    setSuccess(true);
  };

  if (success) return (
    <div className="page animate-in" style={{ paddingTop: 60, textAlign: "center" }}>
      <div className="success-check"><Icon d={Icons.check} size={32} color="white" /></div>
      <div style={{ fontWeight: 700, fontSize: 20, marginBottom: 8 }}>Поповнено!</div>
      <div style={{ color: "var(--text-secondary)", marginBottom: 24 }}>{fmtCurrency(parseFloat(amount), currency)} зараховано на рахунок</div>
      <button className="btn btn-primary" onClick={goBack}>Повернутись</button>
    </div>
  );

  return (
    <div className="page animate-in" style={{ paddingTop: 16 }}>
      <div className="input-group">
        <label>Сума</label>
        <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" />
      </div>
      <div className="input-group">
        <label>Валюта</label>
        <select value={currency} onChange={e => setCurrency(e.target.value)}>
          <option value="UAH">UAH — Гривня</option>
          <option value="USD">USD — Долар</option>
          <option value="EUR">EUR — Євро</option>
        </select>
      </div>
      <div className="section-title">Спосіб оплати</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
        {[["card", "💳 Банківська картка"], ["apple_pay", " Apple Pay"], ["google_pay", "🤖 Google Pay"]].map(([key, label]) => (
          <div key={key} className="card card-clickable" onClick={() => setMethod(key)}
            style={{ padding: "14px 16px", border: method === key ? "1px solid var(--accent)" : undefined, background: method === key ? "var(--accent-glow)" : undefined }}>
            <span style={{ fontSize: 14 }}>{label}</span>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="toggle-row">
          <span className="toggle-label">Оплата з кредитного ліміту?</span>
          <button className={`toggle ${isCredit ? 'on' : ''}`} onClick={() => setIsCredit(!isCredit)} />
        </div>
        {isCredit && (
          <div className="animate-in" style={{ marginTop: 12 }}>
            <div className="input-group">
              <label>Перший день списання</label>
              <input type="date" value={drawdownDate} onChange={e => setDrawdownDate(e.target.value)} />
            </div>
            <div className="input-group">
              <label>Грейс-період (днів)</label>
              <input type="number" value={graceDays} onChange={e => setGraceDays(e.target.value)} placeholder="55" />
            </div>
            <div style={{ fontSize: 12, color: "var(--text-muted)", lineHeight: 1.5, marginTop: 4 }}>
              Ми нагадаємо про закінчення грейс-періоду за 7, 3 та 1 день.
            </div>
          </div>
        )}
      </div>
      <button className="btn btn-primary" style={{ marginTop: 20 }} onClick={handleDeposit} disabled={!amount || loading}>
        {loading ? <div className="loading-spinner" /> : `Поповнити ${amount ? fmtCurrency(parseFloat(amount), currency) : ""}`}
      </button>
    </div>
  );
}

// --- WITHDRAW PAGE ---

  const [dest, setDest] = useState("card");

  if (success) return (
    <div className="page animate-in" style={{ paddingTop: 60, textAlign: "center" }}>

      <div style={{ fontWeight: 700, fontSize: 20, marginBottom: 8 }}>Виведення оформлено!</div>
      <div style={{ color: "var(--text-secondary)", marginBottom: 24 }}>{fmtCurrency(parseFloat(amount), currency)} буде зараховано протягом 1-3 робочих днів</div>
      <button className="btn btn-primary" onClick={goBack}>Повернутись</button>
    </div>
  );

  return (
    <div className="page animate-in" style={{ paddingTop: 16 }}>
      <div className="input-group">
        <label>Сума</label>
        <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" />
      </div>
      <div className="input-group">
        <label>Валюта</label>
        <select value={currency} onChange={e => setCurrency(e.target.value)}>
          <option value="UAH">UAH</option>
          <option value="USD">USD</option>
        </select>
      </div>
      <div className="section-title">Куди вивести</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
        <div className="card card-clickable" onClick={() => setDest("card")}
          style={{ padding: "14px 16px", border: dest === "card" ? "1px solid var(--accent)" : undefined }}>
          <div style={{ fontWeight: 600, fontSize: 14 }}>💳 На картку</div>
          <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 4 }}>Visa •••• 4821</div>
        </div>
        <div className="card card-clickable" onClick={() => setDest("iban")}
          style={{ padding: "14px 16px", border: dest === "iban" ? "1px solid var(--accent)" : undefined }}>
          <div style={{ fontWeight: 600, fontSize: 14 }}>🏦 На IBAN</div>
        </div>
      </div>
      {dest === "iban" && (
        <div className="input-group animate-in">
          <label>IBAN</label>
          <input value={iban} onChange={e => setIban(e.target.value)} placeholder="UA..." style={{ fontFamily: "var(--font-mono)", fontSize: 13 }} />
        </div>
      )}
      <button className="btn btn-primary" style={{ marginTop: 16 }} onClick={handleWithdraw} disabled={!amount || loading}>
        {loading ? <div className="loading-spinner" /> : "Вивести"}
      </button>
    </div>
  );
}

// --- NOTIFICATIONS ---
function NotificationsPage() {
  const [notifs, setNotifs] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    API.notifications.list().then(n => { setNotifs(n); setLoading(false); });
  }, []);

  if (loading) return <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><div className="loading-spinner" /></div>;

  return (
    <div className="animate-in">
      {notifs.map(n => (
        <div key={n.id} className={`notif-item ${!n.isRead ? 'unread' : ''}`} onClick={() => {
          setNotifs(prev => prev.map(x => x.id === n.id ? { ...x, isRead: true } : x));
          API.notifications.markRead(n.id);
        }}>
          <div className={`notif-dot ${n.isRead ? 'read' : ''}`} />
          <div className="notif-body">
            <div className="notif-title">{n.title}</div>
            <div className="notif-text">{n.body}</div>
            <div className="notif-time">{fmtDate(n.sentAt)}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// --- WALLET PAGE ---
function WalletPage({ navigate }) {
  const [trades, setTrades] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    API.trade.history().then(t => { setTrades(t); setLoading(false); });
  }, []);

  return (
    <div className="page animate-in" style={{ paddingTop: 16 }}>
      <div className="summary-grid">
        <div className="summary-card">
          <div className="summary-label">Баланс UAH</div>
          <div className="summary-value sm">{fmt(MOCK_ACCOUNT.balanceUah)} ₴</div>
        </div>
        <div className="summary-card">
          <div className="summary-label">Баланс USD</div>
          <div className="summary-value sm">${fmt(MOCK_ACCOUNT.balanceUsd)}</div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <button className="btn btn-primary btn-sm" style={{ flex: 1 }} onClick={() => navigate("deposit")}>
          <Icon d={Icons.plus} size={16} /> Поповнити
        </button>
        <button className="btn btn-secondary btn-sm" style={{ flex: 1 }} onClick={() => navigate("withdraw")}>
          <Icon d={Icons.send} size={16} /> Вивести
        </button>
      </div>
      <div className="section-title">Історія угод</div>
      {loading ? (
        <div style={{ display: "flex", justifyContent: "center", padding: 40 }}><div className="loading-spinner" /></div>
      ) : (
        trades.map(t => {
          const sec = getSecurityByIsin(t.isin);
          return (
            <div key={t.tradeId} className="card" style={{ padding: "14px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>
                    <span style={{ color: t.side === "buy" ? "var(--green)" : "var(--red)", marginRight: 6 }}>
                      {t.side === "buy" ? "КУПІВЛЯ" : "ПРОДАЖ"}
                    </span>
                    {sec?.name}
                  </div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 4, fontFamily: "var(--font-mono)" }}>
                    {t.quantity} шт. × {fmt(t.price)}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "var(--font-mono)" }}>{fmt(t.totalAmount)}</div>
                  <div style={{ fontSize: 10, color: "var(--text-muted)", marginTop: 4 }}>{fmtDate(t.createdAt)}</div>
                </div>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [authed, setAuthed] = useState(false);
  const [currentPage, setCurrentPage] = useState("dashboard");
  const [pageParam, setPageParam] = useState(null);
  const [pageHistory, setPageHistory] = useState([]);

  const navigate = useCallback((page, param = null) => {
    setPageHistory(prev => [...prev, { page: currentPage, param: pageParam }]);
    setCurrentPage(page);
    setPageParam(param);
  }, [currentPage, pageParam]);

  const goBack = useCallback(() => {
    if (pageHistory.length > 0) {
      const prev = pageHistory[pageHistory.length - 1];
      setPageHistory(h => h.slice(0, -1));
      setCurrentPage(prev.page);
      setPageParam(prev.param);
    }
  }, [pageHistory]);

  const isSubPage = ["security", "deposit", "withdraw", "yieldCurveGov", "yieldCurveCorp", "issuer"].includes(currentPage);
  const unreadNotifs = MOCK_NOTIFICATIONS.filter(n => !n.isRead).length;

  if (!authed) return (
    <>
      <style>{CSS}</style>
      <div className="app">
        <OnboardingPage onLogin={() => setAuthed(true)} />
      </div>
    </>
  );

  const pageTitles = {
    dashboard: null, assets: "Активи", cashflows: "Грошові потоки", securities: "Цінні папери",
    catalog: "Каталог", wallet: "Гаманець", notifications: "Сповіщення",
    security: "Деталі", deposit: "Поповнення", withdraw: "Виведення",
    yieldCurveGov: "Крива доходності", yieldCurveCorp: "Крива доходності",
    issuer: "Емітент",
  };

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        <div className="demo-banner">🔧 DEMO — FinMart — усі API замокані</div>

        {/* Header */}
        <div className="header">
          {isSubPage ? (
            <button className="header-back" onClick={goBack}><Icon d={Icons.chevron_left} size={22} /> Назад</button>
          ) : (
            <FinMartLogo size={28} />
          )}
          {pageTitles[currentPage] && <div className="header-title">{pageTitles[currentPage]}</div>}
          {!isSubPage && (
            <div className="header-badge" style={{ cursor: "pointer" }} onClick={() => navigate("notifications")}>
              <Icon d={Icons.bell} size={22} color="var(--text-secondary)" />
              {unreadNotifs > 0 && <div className="dot" />}
            </div>
          )}
          {isSubPage && <div style={{ width: 60 }} />}
        </div>

        {/* Pages */}
        {currentPage === "dashboard" && <DashboardPage navigate={navigate} />}
        {currentPage === "assets" && <AssetsPage navigate={navigate} />}
        {currentPage === "cashflows" && <CashFlowsPage navigate={navigate} />}
        {currentPage === "securities" && <SecuritiesPage navigate={navigate} />}
        {currentPage === "catalog" && <CatalogPage navigate={navigate} />}
        {currentPage === "wallet" && <WalletPage navigate={navigate} />}
        {currentPage === "notifications" && <NotificationsPage />}
        {currentPage === "security" && <SecurityDetailPage isin={pageParam} navigate={navigate} goBack={goBack} />}
        {currentPage === "deposit" && <DepositPage goBack={goBack} />}
        {currentPage === "withdraw" && <WithdrawPage goBack={goBack} />}
        {currentPage === "yieldCurveGov" && <YieldCurvePage type="government" goBack={goBack} />}
        {currentPage === "yieldCurveCorp" && <YieldCurvePage type="corporate" goBack={goBack} />}
        {currentPage === "issuer" && <IssuerPage issuerId={pageParam} navigate={navigate} goBack={goBack} />}

        {/* Bottom nav — 5 tabs now */}
        {!isSubPage && (
          <div className="bottom-nav">
            {[
              ["dashboard", Icons.home, "Портфель"],
              ["assets", Icons.pie, "Активи"],
              ["cashflows", Icons.barChart, "Потоки"],
              ["securities", Icons.briefcase, "ЦП"],
              ["wallet", Icons.wallet, "Гаманець"],
            ].map(([page, icon, label]) => (
              <button key={page} className={`nav-item ${currentPage === page ? 'active' : ''}`} onClick={() => { setCurrentPage(page); setPageParam(null); setPageHistory([]); }}>
                <Icon d={icon} size={20} />
                {label}
              </button>
            ))}
          </div>
        )}
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
